[package]
name = "anvil"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "A local-first coding agent runtime for local LLM workflows."
repository = "https://github.com/kewton/Anvil"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"

[dev-dependencies]
serde_json = "1.0"
